<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlitchFinder AI | Odhaľte chyby vo vašom biznise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .gradient-text { background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: #161616; border: 1px solid #262626; border-radius: 12px; }
        .modal-bg { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="max-w-3xl w-full text-center">
        <h1 class="text-5xl font-bold mb-4 tracking-tight">Find the <span class="gradient-text">Glitch</span> in your Business.</h1>
        <p class="text-gray-400 text-xl mb-10">Nechajte AI analyzovať váš web a nájdite skryté chyby, ktoré vás stoja peniaze.</p>

        <div class="card p-8 shadow-2xl">
            <div class="mb-6 text-left">
                <label class="block text-sm font-medium text-gray-500 mb-2">Vložte URL vášho webu</label>
                <input type="text" id="urlInput" placeholder="https://tvojweb.sk" class="w-full bg-black border border-gray-800 rounded-lg py-3 px-4 text-white focus:border-cyan-500 outline-none transition">
            </div>
            
            <button onclick="checkEmailRequirement()" id="auditBtn" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-4 rounded-lg transition transform hover:scale-[1.02]">
                SPUSTIŤ AI AUDIT (49$ Value)
            </button>

            <div id="resultArea" class="mt-8 text-left hidden">
                <div class="p-4 bg-cyan-900/20 border border-cyan-800 rounded-lg">
                    <p id="aiResponse" class="text-cyan-100 text-sm leading-relaxed whitespace-pre-line"></p>
                </div>
            </div>
        </div>

        <p class="mt-10 text-gray-600 text-sm italic">Powered by Gemini Pro AI & GetGlitch.sk Engine</p>
    </div>

    <div id="emailModal" class="fixed inset-0 modal-bg flex items-center justify-center hidden z-50 p-4">
        <div class="card max-w-md w-full p-8 border-cyan-500/50 shadow-[0_0_20px_rgba(6,182,212,0.2)]">
            <h2 class="text-2xl font-bold mb-2 text-center text-white">Analýza pripravená! 🚀</h2>
            <p class="text-gray-400 mb-6 text-sm text-center">Zadajte e-mail, na ktorý vám pošleme výsledok a odomknite okamžitý náhľad.</p>
            
            <input type="email" id="leadEmail" placeholder="vas@email.com" class="w-full bg-black border border-gray-800 rounded-lg py-3 px-4 text-white focus:border-cyan-500 outline-none mb-4">
            
            <button id="submitBtn" onclick="submitLead()" class="w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-gray-200 transition">
                Odomknúť výsledky
            </button>
        </div>
    </div>

    <script>
        let userEmail = "";
        const FORMSPREE_URL = "https://formspree.io/f/xnjoloaz";

        function checkEmailRequirement() {
            const url = document.getElementById('urlInput').value;
            if(!url) return alert("Vlož URL!");
            if (!userEmail) {
                document.getElementById('emailModal').classList.remove('hidden');
            } else {
                startAudit();
            }
        }

        async function submitLead() {
            const emailField = document.getElementById('leadEmail');
            const submitBtn = document.getElementById('submitBtn');
            const url = document.getElementById('urlInput').value;

            if(!emailField.value || !emailField.value.includes('@')) return alert("Zadajte platný e-mail!");
            
            userEmail = emailField.value;
            submitBtn.innerText = "Odosielam...";
            submitBtn.disabled = true;

            // ODOSLANIE DO FORMSPREE
            try {
                await fetch(FORMSPREE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, website: url })
                });
                document.getElementById('emailModal').classList.add('hidden');
                startAudit();
            } catch (error) {
                alert("Chyba pri odosielaní. Skúste to znova.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Odomknúť výsledky";
            }
        }

        function startAudit() {
            const url = document.getElementById('urlInput').value;
            const btn = document.getElementById('auditBtn');
            const result = document.getElementById('resultArea');
            const responseText = document.getElementById('aiResponse');

            btn.innerText = "Gemini AI analyzuje váš web...";
            btn.disabled = true;

            // SEM TERAZ DOPLNÍME REÁLNE GEMINI API
            setTimeout(() => {
                result.classList.remove('hidden');
                responseText.innerText = "✅ ANALÝZA HOTOVÁ PRE: " + url + "\n\nAI detegovala tieto glitche:\n1. Pomalé načítavanie na mobiloch (-15% konverzií).\n2. Chýbajúci 'Trust Signal' v hlavičke.\n3. Slabá výzva k akcii (CTA).\n\nKompletný report bol odoslaný na: " + userEmail;
                btn.innerText = "AUDIT DOKONČENÝ";
                result.scrollIntoView({ behavior: 'smooth' });
            }, 3000);
        }
    </script>
</body>
</html>
