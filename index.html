<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewAssassin AI — Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --acid: #00ffe7; --bg: #050810; }
        body { background: var(--bg); color: #c8d6e8; font-family: 'Exo 2', sans-serif; min-height: 100vh; }
        .cyber-card { border: 1px solid rgba(0,255,231,0.2); background: rgba(10,15,30,0.95); backdrop-filter: blur(10px); }
        .btn-kill { border: 1px solid var(--acid); color: var(--acid); font-family: 'Rajdhani', sans-serif; transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }
        .btn-kill:hover:not(:disabled) { background: rgba(0,255,231,0.1); box-shadow: 0 0 20px rgba(0,255,231,0.3); }
        textarea { background: rgba(0,0,0,0.5) !important; border: 1px solid #1a2a4a !important; color: white !important; width: 100%; height: 140px; padding: 15px; font-size: 14px; }
        .res-box { border-left: 2px solid var(--acid); background: rgba(255,255,255,0.02); padding: 15px; margin-top: 15px; }
    </style>
</head>
<body class="p-6 md:p-20 flex justify-center items-center">

    <div class="max-w-2xl w-full">
        <header class="mb-8 text-center">
            <h1 style="font-family: 'Rajdhani';" class="text-4xl font-bold text-white tracking-tighter uppercase">
                Review<span class="text-[var(--acid)]">Assassin</span>
            </h1>
            <p class="text-[10px] font-mono text-[var(--acid)] opacity-60 tracking-[0.3em]">PRO-MODEL STABLE PROTOCOL v6.0</p>
        </header>

        <div class="cyber-card p-6 rounded-sm">
            <textarea id="reviewInput" placeholder="Vlož sem ten 'výplod' od zákazníka..."></textarea>
            
            <div class="flex justify-between items-center mt-4">
                <div id="loader" class="hidden text-[var(--acid)] font-mono text-[10px] animate-pulse">ANALYZUJEM CIEĽ...</div>
                <button id="genBtn" onclick="execute()" class="btn-kill ml-auto px-8 py-2 font-bold uppercase">⚡ Neutralizovať</button>
            </div>
        </div>

        <div id="results" class="hidden mt-8 space-y-4">
            <div class="res-box">
                <span class="text-[var(--acid)] font-mono text-[10px] uppercase block mb-1">Profesionálna likvidácia:</span>
                <p id="res-1" class="text-sm leading-relaxed"></p>
            </div>
            <div class="res-box" style="border-color: #ff2d78;">
                <span class="text-[#ff2d78] font-mono text-[10px] uppercase block mb-1">Empatická likvidácia:</span>
                <p id="res-2" class="text-sm leading-relaxed"></p>
            </div>
        </div>
    </div>

    <script>
        // SEM VLOŽ SVOJ KĽÚČ Z GOOGLE AI STUDIO
        const API_KEY = 'AIzaSyCm_MHCPb5N8AH4xfOzPwi2UxAEhB8YdT0'; 

        async function execute() {
            const val = document.getElementById('reviewInput').value.trim();
            if(!val) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const results = document.getElementById('results');

            btn.disabled = true;
            loader.classList.remove('hidden');
            results.classList.add('hidden');

            // ZMENA: Používame model 'gemini-pro', ktorý je najviac kompatibilný
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Si expert na PR. Napíš dve slovenské odpovede na túto recenziu: "${val}". Prvá nech je formálna, druhá milá. Oddeľ ich iba značkou ###.` }] }]
                    })
                });

                const data = await response.json();
                
                if(data.error) throw new Error(data.error.message);

                const full = data.candidates[0].content.parts[0].text;
                const parts = full.split('###');

                document.getElementById('res-1').innerText = parts[0].trim();
                document.getElementById('res-2').innerText = (parts[1] || "AI neoddelila odpovede, skús znova.").trim();
                
                results.classList.remove('hidden');
            } catch (e) {
                alert("SYSTÉMOVÁ CHYBA: " + e.message + "\n\nSkontroluj, či si použil správny API kľúč!");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
